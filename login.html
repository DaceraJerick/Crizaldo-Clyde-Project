<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Crizaldo Portfolio</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0f172a;
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent1: #38bdf8;
            --accent2: #0284c7;
            --card-bg: #111827;
            --card-border: #334155;
            --shadow-color: rgba(0, 0, 0, 0.45);
            --shadow-offset: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            background-color: var(--bg);
            background-image:
                radial-gradient(rgba(255, 255, 255, 0.08) 1.5px, transparent 1.5px),
                radial-gradient(rgba(255, 255, 255, 0.08) 1.5px, transparent 1.5px),
                linear-gradient(135deg, #0f172a 0%, #020617 100%);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
            background-attachment: fixed;
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 36px;
        }

        .auth-container {
            width: 100%;
            max-width: 460px;
            background: rgba(30, 41, 59, 0.96);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 42px 36px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
            text-align: center;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 0.08em;
            margin-bottom: 6px;
            color: var(--accent1);
        }

        .logo-sub {
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 28px;
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 30px;
            margin-bottom: 10px;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        p.subtitle {
            font-size: 15px;
            color: var(--muted);
            margin-bottom: 32px;
            line-height: 1.7;
        }

        .form-group {
            text-align: left;
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        input {
            width: 100%;
            padding: 16px 18px;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.25);
            background: rgba(15, 23, 42, 0.9);
            color: var(--text);
            font-family: inherit;
            font-size: 15px;
            font-weight: 500;
            transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent1);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.12);
            transform: translateY(-1px);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 18px;
            border: none;
            font-family: inherit;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
            margin-bottom: 18px;
            box-shadow: 0 18px 36px rgba(0, 0, 0, 0.22);
            background: linear-gradient(135deg, var(--accent1), var(--accent2));
            color: var(--bg);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 22px 42px rgba(0, 0, 0, 0.28);
        }

        .btn:active {
            transform: translateY(1px);
            box-shadow: 0 10px 18px rgba(0, 0, 0, 0.2);
        }

        .toggle-auth {
            font-size: 14px;
            color: var(--muted);
            font-weight: 600;
            line-height: 1.8;
            margin-top: 20px;
        }

        .toggle-auth span,
        .toggle-action {
            color: var(--accent1);
            text-decoration: underline;
            cursor: pointer;
            font-weight: 700;
        }

        #errorMessage {
            color: #f87171;
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            text-align: left;
        }

        .success-message {
            color: #22c55e;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            text-align: left;
        }

        .demo-box {
            margin-top: 26px;
            padding: 18px 20px;
            background: rgba(56, 189, 248, 0.08);
            border: 1px solid rgba(56, 189, 248, 0.18);
            border-radius: 16px;
            color: var(--muted);
            text-align: left;
            font-size: 13.5px;
            line-height: 1.6;
        }

        .demo-box strong {
            color: var(--text);
        }

        .demo-detail {
            margin-top: 6px;
        }

        .hidden {
            display: none;
        }

        .loading {
            opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="logo">CRIZALDO</div>
        <div class="logo-sub">Webdev Portfolio</div>

        <h2 id="authTitle">Welcome Back</h2>
        <p class="subtitle" id="authSubtitle">Please enter your details to sign in.</p>

        <div id="errorMessage"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="authForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required minlength="6">
            </div>
            <div class="form-group hidden" id="confirmGroup">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary" id="submitBtn">Sign In</button>
        </form>

        <div class="toggle-auth" id="toggleAuth">
            Don't have an account? <span onclick="toggleMode()">Sign Up</span>
        </div>

        <div id="demoBox" class="demo-box">
            <strong>Demo Login</strong><br>
            <div class="demo-detail">Email: <strong>username@gmail.com</strong></div>
            <div>Password: <strong>password</strong></div>
        </div>

    </div>

    <script type="module">
        import { auth } from './auth.js';

        let isSignUp = false;

        const form = document.getElementById('authForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        const authTitle = document.getElementById('authTitle');
        const authSubtitle = document.getElementById('authSubtitle');
        const toggleAuthDiv = document.getElementById('toggleAuth');
        const confirmGroup = document.getElementById('confirmGroup');
        const confirmInput = document.getElementById('confirmPassword');
        const demoBox = document.getElementById('demoBox');

        window.toggleMode = function () {
            isSignUp = !isSignUp;
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (isSignUp) {
                authTitle.textContent = 'Create Account';
                authSubtitle.textContent = 'Sign up to get your own portfolio session.';
                submitBtn.textContent = 'Sign Up';
                toggleAuthDiv.innerHTML = 'Already have an account? <span class="toggle-action" onclick="toggleMode()">Sign In</span>';
                confirmGroup.style.display = 'block';
                confirmInput.required = true;
                demoBox.style.display = 'none';
            } else {
                authTitle.textContent = 'Welcome Back';
                authSubtitle.textContent = 'Please enter your details to sign in.';
                submitBtn.textContent = 'Sign In';
                toggleAuthDiv.innerHTML = 'Don\'t have an account? <span class="toggle-action" onclick="toggleMode()">Sign Up</span>';
                confirmGroup.style.display = 'none';
                confirmInput.required = false;
                demoBox.style.display = 'block';
            }
        };

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (isSignUp) {
                const confirm = confirmInput.value;
                if (password !== confirm) {
                    errorDiv.textContent = 'Passwords do not match.';
                    errorDiv.style.display = 'block';
                    return;
                }
                if (password.length < 6) {
                    errorDiv.textContent = 'Password must be at least 6 characters.';
                    errorDiv.style.display = 'block';
                    return;
                }

                submitBtn.classList.add('loading');
                submitBtn.textContent = 'Creating Account...';

                try {
                    const { data, error } = await auth.signUp(email, password);

                    if (error) {
                        errorDiv.textContent = error.message;
                        errorDiv.style.display = 'block';
                    } else {
                        successDiv.textContent = '✓ Account created! Signing you in...';
                        successDiv.style.display = 'block';

                        const { data: loginData, error: loginError } = await auth.signIn(email, password);
                        if (loginError) {
                            successDiv.textContent = '✓ Account created! Please sign in.';
                            toggleMode();
                        } else {
                            window.location.href = 'index.html';
                        }
                    }
                } catch (err) {
                    errorDiv.textContent = 'An unexpected error occurred.';
                    errorDiv.style.display = 'block';
                } finally {
                    submitBtn.classList.remove('loading');
                    submitBtn.textContent = 'Sign Up';
                }
            } else {
                submitBtn.classList.add('loading');
                submitBtn.textContent = 'Signing In...';

                try {
                    const { data, error } = await auth.signIn(email, password);

                    if (error) {
                        errorDiv.textContent = error.message;
                        errorDiv.style.display = 'block';
                    } else {
                        window.location.href = 'index.html';
                    }
                } catch (err) {
                    errorDiv.textContent = 'An unexpected error occurred.';
                    errorDiv.style.display = 'block';
                } finally {
                    submitBtn.classList.remove('loading');
                    submitBtn.textContent = 'Sign In';
                }
            }
        });

        // Check if already logged in
        auth.getSession().then(({ session }) => {
            if (session) window.location.href = 'index.html';
        });
    </script>
</body>

</html>
