<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Joyce Delmoro Portfolio</title>
    <meta name="description" content="Sign in to Joyce Delmoro's Web Development Portfolio.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0f172a;
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent1: #38bdf8;
            --accent2: #0284c7;
            --card-bg: #1e293b;
            --card-border: #334155;
            --shadow-color: rgba(0, 0, 0, 0.6);
            --shadow-offset: 8px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
                        background-color: #0f172a;
            background-image: 
                radial-gradient(rgba(255,255,255,0.08) 1.5px, transparent 1.5px),
                radial-gradient(rgba(255,255,255,0.08) 1.5px, transparent 1.5px),
                linear-gradient(135deg, #0f172a 0%, #020617 100%);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            border: 3px solid var(--card-border);
            border-radius: 12px;
            padding: 40px;
            box-shadow: var(--shadow-offset) var(--shadow-offset) 15px var(--shadow-color);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .auth-container::before {
            content: '';
            position: absolute;
            top: -60px; left: -60px;
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(180,80,150,0.18) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Logo */
        .logo-name {
            font-size: 38px;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -0.5px;
            line-height: 1.1;
            margin-bottom: 6px;
        }

        .logo-sub {
            font-size: 14px;
            font-weight: 400;
            color: var(--muted);
            margin-bottom: 32px;
            letter-spacing: 0.3px;
        }

        /* Tab Toggle */
        .tab-toggle {
            display: flex;
            background: rgba(255,255,255,0.05);
            border-radius: 50px;
            padding: 4px;
            margin-bottom: 28px;
            position: relative;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 0;
            border: none;
            background: transparent;
            color: var(--muted);
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            z-index: 1;
        }

        .tab-btn.active {
            background: var(--tab-active-bg);
            color: var(--text);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Form */
        .form-group {
            text-align: left;
            margin-bottom: 18px;
        }

        .form-label {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .form-label .icon {
            font-size: 14px;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 3px solid var(--text);
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.15s;
            box-shadow: 3px 3px 15px var(--text);
        }

        input:focus {
            outline: none;
            background: var(--bg);
            transform: translateY(-2px);
            box-shadow: 4px 4px 15px var(--text);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 3px solid var(--text);
            font-family: inherit;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            margin-bottom: 16px;
            box-shadow: var(--shadow-offset) var(--shadow-offset) 15px var(--shadow-color);
            background: var(--text);
            color: var(--bg);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: calc(var(--shadow-offset) + 2px) calc(var(--shadow-offset) + 2px) 15px var(--shadow-color);
        }

        .btn:active {
            transform: translateY(-2px);
            box-shadow: 0px 0px 15px var(--shadow-color);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Error / Success */
        #errorMessage {
            color: #f87171;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 14px;
            display: none;
            text-align: left;
        }

        #successMessage {
            color: #86efac;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 14px;
            display: none;
            text-align: left;
        }

        /* Demo box */
        .demo-box {
            margin-top: 4px;
            padding: 16px 18px;
            background: rgba(255,255,255,0.04);
            border: 1px dashed rgba(200,120,170,0.3);
            border-radius: 14px;
            font-size: 13px;
            color: var(--muted);
            text-align: center;
        }

        .demo-box-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .demo-box p {
            margin: 4px 0;
            font-size: 13px;
        }

        .demo-box strong {
            color: var(--text);
            font-weight: 600;
        }

        /* Toggle link */
        .toggle-link {
            font-size: 13.5px;
            color: var(--muted);
            margin-bottom: 20px;
            display: block;
        }

        .toggle-link span {
            color: var(--accent);
            font-weight: 700;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        /* Confirm field hidden by default */
        #confirmGroup { display: none; }

        .loading { opacity: 0.7; pointer-events: none; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo-name">Joyce Delmoro</div>
        <div class="logo-sub">Web Development Portfolio</div>

        <!-- Tab Toggle -->
        <div class="tab-toggle">
            <button class="tab-btn active" id="tabLogin" onclick="setMode(false)">Login</button>
            <button class="tab-btn" id="tabSignup" onclick="setMode(true)">Sign Up</button>
        </div>

        <div id="errorMessage"></div>
        <div id="successMessage"></div>

        <form id="authForm">
            <div class="form-group">
                <div class="form-label"><span class="icon">✉</span> Email</div>
                <input type="email" id="email" placeholder="demo@example.com" required>
            </div>
            <div class="form-group">
                <div class="form-label"><span class="icon">🔒</span> Password</div>
                <input type="password" id="password" placeholder="••••••••" required minlength="6">
            </div>
            <div class="form-group" id="confirmGroup">
                <div class="form-label"><span class="icon">🔒</span> Confirm Password</div>
                <input type="password" id="confirmPassword" placeholder="••••••••">
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">LOGIN</button>
        </form>

        <div class="demo-box" id="demoBox">
            <div class="demo-box-title">ℹ Demo Account:</div>
            <p>Email: <strong>demo@example.com</strong></p>
            <p>Password: <strong>demo123</strong></p>
        </div>
    </div>

    <script type="module">
        import { auth } from './auth.js';

        let isSignUp = false;

        const form       = document.getElementById('authForm');
        const submitBtn  = document.getElementById('submitBtn');
        const errorDiv   = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        const confirmGrp = document.getElementById('confirmGroup');
        const confirmInp = document.getElementById('confirmPassword');
        const demoBox    = document.getElementById('demoBox');
        const tabLogin   = document.getElementById('tabLogin');
        const tabSignup  = document.getElementById('tabSignup');

        window.setMode = function (signup) {
            isSignUp = signup;
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (signup) {
                tabSignup.classList.add('active');
                tabLogin.classList.remove('active');
                submitBtn.textContent = 'SIGN UP';
                confirmGrp.style.display = 'block';
                confirmInp.required = true;
                demoBox.style.display = 'none';
            } else {
                tabLogin.classList.add('active');
                tabSignup.classList.remove('active');
                submitBtn.textContent = 'LOGIN';
                confirmGrp.style.display = 'none';
                confirmInp.required = false;
                demoBox.style.display = 'block';
            }
        };

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email    = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (isSignUp) {
                if (password !== confirmInp.value) {
                    errorDiv.textContent = 'Passwords do not match.';
                    errorDiv.style.display = 'block';
                    return;
                }
                if (password.length < 6) {
                    errorDiv.textContent = 'Password must be at least 6 characters.';
                    errorDiv.style.display = 'block';
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.textContent = 'Creating Account…';

                try {
                    const { data, error } = await auth.signUp(email, password);
                    if (error) {
                        errorDiv.textContent = error.message;
                        errorDiv.style.display = 'block';
                    } else {
                        successDiv.textContent = '✓ Account created! Signing you in…';
                        successDiv.style.display = 'block';
                        const { error: loginError } = await auth.signIn(email, password);
                        if (loginError) { setMode(false); }
                        else { window.location.href = 'index.html'; }
                    }
                } catch {
                    errorDiv.textContent = 'An unexpected error occurred.';
                    errorDiv.style.display = 'block';
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'SIGN UP';
                }
            } else {
                submitBtn.disabled = true;
                submitBtn.textContent = 'Signing In…';

                try {
                    const { error } = await auth.signIn(email, password);
                    if (error) {
                        errorDiv.textContent = error.message;
                        errorDiv.style.display = 'block';
                    } else {
                        window.location.href = 'index.html';
                    }
                } catch {
                    errorDiv.textContent = 'An unexpected error occurred.';
                    errorDiv.style.display = 'block';
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'LOGIN';
                }
            }
        });

        // Auto-redirect if already logged in
        auth.getSession().then(({ session }) => {
            if (session) window.location.href = 'index.html';
        });
    </script>
</body>
</html>
